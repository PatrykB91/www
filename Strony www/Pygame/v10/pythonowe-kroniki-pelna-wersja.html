const { useState, useEffect, useRef } = React;

let pyodideInstance = null;

async function initPyodide() {
  if (pyodideInstance) return pyodideInstance;
  try {
    pyodideInstance = await loadPyodide({
      indexURL: "https://cdn.jsdelivr.net/pyodide/v0.24.1/full/"
    });
    return pyodideInstance;
  } catch (error) {
    console.error("Błąd ładowania Pyodide:", error);
    return null;
  }
}

async function runPythonCode(code) {
  if (!pyodideInstance) await initPyodide();
  if (!pyodideInstance) return { success: false, output: "Błąd inicjalizacji Pyodide" };

  try {
    pyodideInstance.runPython(`
import sys
from io import StringIO
sys.stdout = StringIO()
    `);

    try {
      pyodideInstance.runPython(code);
    } catch (error) {
      return { success: false, output: `Błąd wykonania: ${error.message}` };
    }

    const stdout = pyodideInstance.runPython("sys.stdout.getvalue()");
    pyodideInstance.runPython(`sys.stdout = sys.__stdout__`);
    return { success: true, output: stdout.trim() };
  } catch (error) {
    return { success: false, output: `Błąd: ${error.message}` };
  }
}

        <div className="pfill" style={{width:'100%',background:'linear-gradient(90deg,#3b82f6,#8b5cf6)'}}></div>
      </div>
    </div>
  </div>
);

// HEADER
const Header = ({ player, onUsePot }) => {
  const handleUsePot = () => {
    if (player.pt > 0 && player.hp < player.mhp) onUsePot();
  };

  return (
    <div style={{background:'linear-gradient(135deg,#1e293b,#334155)',padding:'12px 16px',borderBottom:'2px solid rgba(148,163,184,.3)',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <div style={{fontSize:28}}>🧙‍♂️</div>
        <div>
          <div className="tg" style={{fontSize:15,fontWeight:'bold'}}>{player.rk}</div>
          <div className="tm" style={{fontSize:12}}>Level {player.lv}</div>
        </div>
      </div>
      <div style={{display:'flex',gap:12,alignItems:'center'}}>
        <div style={{minWidth:140}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
            <span className="tr" style={{fontSize:12}}>❤️ {player.hp}/{player.mhp}</span>
            <span className="tb" style={{fontSize:12}}>⭐ {player.xp} XP</span>
          </div>
          <div className="pbar">
            <div className="pfill" style={{width:`${(player.hp/player.mhp)*100}%`,background:'linear-gradient(90deg,#ef4444,#dc2626)'}}></div>
          </div>
        </div>
        <button className="btn bw" onClick={handleUsePot} disabled={player.pt===0 || player.hp===player.mhp} style={{fontSize:12,padding:'6px 12px'}}>
          🧪 {player.pt}
        </button>
      </div>
    </div>
  );
};

// CHAPTER SELECT
const ChapterSelect = ({ player, onSelectChapter, onRestart }) => {
  const chapters = Object.values(QUESTS);
  
  return (
    <div className="ctr" style={{background:'linear-gradient(135deg,#0f172a,#1e293b)',minHeight:'calc(100vh - 60px)'}}>
      <div className="box" style={{maxWidth:500}}>
        <div style={{textAlign:'center',marginBottom:20}}>
          <h1 className="tg" style={{fontSize:28,marginBottom:8}}>📚 Pythonowe Kroniki</h1>
          <p className="tm" style={{fontSize:14}}>Wybierz Rozdział - System Fazowy</p>
        </div>
        
        <div className="grid" style={{gap:12}}>
          {chapters.map(ch => {
            const unlocked = player.lv >= ch.reqLv;
            const completed = player.dn.filter(id => id.startsWith(ch.id)).length === ch.quests.length;
            
            return (
              <div 
                key={ch.id}
                className={`qi ${completed ? 'dn' : ''}`}
                onClick={() => unlocked && onSelectChapter(ch.id)}
                style={{opacity: unlocked ? 1 : 0.5, cursor: unlocked ? 'pointer' : 'not-allowed'}}
              >
                <div>
                  <div style={{fontSize:24,marginBottom:4}}>{ch.icon}</div>
                  <div className="tg" style={{fontSize:15,fontWeight:'bold'}}>{ch.name}</div>
                  <div className="tm" style={{fontSize:11}}>{ch.desc}</div>
                  {!unlocked && <div className="tr" style={{fontSize:10,marginTop:4}}>🔒 Wymaga Lv{ch.reqLv}</div>}
                </div>
                <div style={{textAlign:'right'}}>
                  {completed && <div className="ts" style={{fontSize:11}}>✓ Ukończono</div>}
                  <div className="tm" style={{fontSize:10}}>{ch.quests.length} questów</div>
                </div>
              </div>
            );
          })}
        </div>
        
        <div style={{marginTop:20,textAlign:'center'}}>
          <button className="btn bg" onClick={onRestart} style={{fontSize:12}}>🔄 Zresetuj grę</button>
        </div>
      </div>
    </div>
  );
};

// QUEST LIST
const QuestList = ({ chapter, player, onSelectQuest, onBack }) => {
  const chapterData = QUESTS[chapter];
  
  return (
    <div className="ctr" style={{background:'linear-gradient(135deg,#0f172a,#1e293b)',minHeight:'calc(100vh - 60px)'}}>
      <div className="box" style={{maxWidth:500}}>
        <button className="btn bg" onClick={onBack} style={{fontSize:12,marginBottom:16}}>← Powrót</button>
        
        <div style={{textAlign:'center',marginBottom:20}}>
          <div style={{fontSize:48}}>{chapterData.icon}</div>
          <h2 className="tg" style={{fontSize:24}}>{chapterData.name}</h2>
          <p className="tm" style={{fontSize:13}}>{chapterData.desc}</p>
        </div>
        
        <div className="ql">
          {chapterData.quests.map((q, idx) => {
            const completed = player.dn.includes(q.id);
            const isCurrent = idx === player.qi && player.ch === chapter;
            
            return (
              <div 
                key={q.id}
                className={`qi ${completed ? 'dn' : ''} ${isCurrent ? 'cu' : ''}`}
                onClick={() => onSelectQuest(idx)}
              >
                <div>
                  <div style={{fontSize:20,marginBottom:4}}>{q.em}</div>
                  <div className="tg" style={{fontSize:14,fontWeight:'bold'}}>{q.en}</div>
                  <div className="tm" style={{fontSize:11}}>{q.phases.length} fazy</div>
                  {q.bs && <div className="tp" style={{fontSize:10}}>👑 BOSS</div>}
                </div>
                <div style={{textAlign:'right'}}>
                  {completed && <div className="ts" style={{fontSize:11}}>✓</div>}
                  <div className="tm" style={{fontSize:11}}>❤️ {q.hp}</div>
                  <div className="tb" style={{fontSize:11}}>⭐ +{q.xp}</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

// BATTLE
const Battle = ({ quest, player, onVictory, onGameOver, onBack, onUpdatePlayerHp }) => {
  const [currentPhase, setCurrentPhase] = useState(0);
  const [enemyHp, setEnemyHp] = useState(quest.hp);
  const [code, setCode] = useState('');
  const [output, setOutput] = useState('');
  const [isExecuting, setIsExecuting] = useState(false);
  const [showTheory, setShowTheory] = useState(false);
  const [showHint, setShowHint] = useState(false);
  const [phaseAnimation, setPhaseAnimation] = useState(false);
  
  const phase = quest.phases[currentPhase];
  const hpPerPhase = Math.ceil(quest.hp / quest.phases.length);

  const handleRun = async () => {
    setIsExecuting(true);
    setOutput('Wykonywanie...');
    
    const result = await runPythonCode(code);
    
    if (result.success) {
      const userOutput = result.output.trim();
      const expectedOutput = phase.ex.trim();
      
      if (userOutput === expectedOutput) {
        setOutput(`✅ Poprawnie! Zadano ${hpPerPhase} obrażeń!`);
        const newEnemyHp = Math.max(0, enemyHp - hpPerPhase);
        setEnemyHp(newEnemyHp);
        
        if (newEnemyHp === 0) {
          setTimeout(() => onVictory(), 800);
        } else if (currentPhase < quest.phases.length - 1) {
          setTimeout(() => {
            setPhaseAnimation(true);
            setTimeout(() => {
              setCurrentPhase(currentPhase + 1);
              setCode('');
              setOutput('');
              setShowHint(false);
              setPhaseAnimation(false);
            }, 800);
          }, 1000);
        }
      } else {
        setOutput(`❌ Błędny wynik!\nOtrzymano: ${userOutput}\nOczekiwano: ${expectedOutput}`);
        const newPlayerHp = Math.max(0, player.hp - 20);
        onUpdatePlayerHp(newPlayerHp);
        if (newPlayerHp === 0) setTimeout(() => onGameOver(), 500);
      }
    } else {
      setOutput(result.output);
      const newPlayerHp = Math.max(0, player.hp - 15);
      onUpdatePlayerHp(newPlayerHp);
      if (newPlayerHp === 0) setTimeout(() => onGameOver(), 500);
    }
    
    setIsExecuting(false);
  };

  return (
    <div className="ctr" style={{background:'linear-gradient(135deg,#450a0a,#0f172a)',minHeight:'calc(100vh - 60px)'}}>
      <div className="box" style={{maxWidth:700}}>
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          <button className="btn bg" onClick={onBack} style={{fontSize:12,padding:'6px 12px'}}>← Powrót</button>
          <button className="btn tp" onClick={()=>setShowTheory(!showTheory)} style={{fontSize:12,padding:'6px 12px'}}>
            📖 Teoria
          </button>
        </div>
        
        {showTheory && phase.th && (
          <div className="box" style={{marginBottom:16,background:'rgba(124,58,237,.15)',borderColor:'#a855f7',border:'2px solid'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <div className="tp" style={{fontSize:15,fontWeight:'bold'}}>📖 {phase.tp}</div>
              <button onClick={()=>setShowTheory(false)} style={{background:'transparent',border:'none',color:'#94a3b8',cursor:'pointer',fontSize:18}}>✕</button>
            </div>
            <p className="tm" style={{fontSize:13,lineHeight:1.6}}>{phase.th}</p>
          </div>
        )}
        
        <div className="grid grid2" style={{marginBottom:16}}>
          <div className={`box ${phaseAnimation ? 'phaseAnim' : ''}`} style={{textAlign:'center',background:'rgba(15,23,42,.6)'}}>
            <div style={{fontSize:48,marginBottom:6}}>{quest.em}</div>
            <div className="tr" style={{fontSize:16,fontWeight:'bold',marginBottom:4}}>
              {quest.en}
              <span className={`phaseIndicator phase${phase.phase}`}>
                Faza {phase.phase}/{quest.phases.length}
              </span>
            </div>
            <div className="tm" style={{fontSize:11,marginBottom:8}}>{phase.tp}</div>
            <div className="pbar">
              <div className="pfill" style={{width:`${(enemyHp/quest.hp)*100}%`,background:'linear-gradient(90deg,#dc2626,#b91c1c)'}}></div>
            </div>
            <div className="tr" style={{fontSize:12,marginTop:4}}>❤️ {enemyHp}/{quest.hp}</div>
          </div>
          
          <div className="box" style={{background:'rgba(15,23,42,.6)'}}>
            <div className="tp" style={{fontSize:13,fontWeight:'bold',marginBottom:6}}>
              📋 Zadanie (Faza {phase.phase}):
            </div>
            <p className="tm" style={{fontSize:12,marginBottom:8}}>{phase.tk}</p>
            <div className="ts" style={{fontSize:11,marginBottom:4}}>✓ Oczekiwany wynik:</div>
            <div className="con" style={{minHeight:40,fontSize:11}}>{phase.ex}</div>
          </div>
        </div>

        <div className="grid">
          <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
              <label className="tb" style={{fontSize:13,fontWeight:'bold'}}>💻 Twój kod Python:</label>
              <button className="btn" onClick={()=>setShowHint(!showHint)} style={{fontSize:11,padding:'4px 10px',background:'#334155'}}>
                {showHint ? '🙈 Ukryj' : '💡 Podpowiedź'}
              </button>
            </div>
            <textarea 
              className="code" 
              value={code} 
              onChange={(e)=>setCode(e.target.value)}
              placeholder="# Wpisz swój kod Python..."
              spellCheck="false"
            />
            {showHint && (
              <div className="box" style={{marginTop:8,background:'rgba(139,92,246,.1)',borderColor:'#8b5cf6'}}>
                <div className="tp" style={{fontSize:11,fontWeight:'bold',marginBottom:4}}>💡 Podpowiedź:</div>
                <div className="tm" style={{fontSize:11,marginBottom:6}}>{phase.ls}</div>
                <pre className="code" style={{fontSize:11,minHeight:'auto',padding:8}}>{phase.ht}</pre>
              </div>
            )}
          </div>

          <div>
            <label className="ts" style={{fontSize:13,fontWeight:'bold',display:'block',marginBottom:6}}>📤 Wynik:</label>
            <div className="con">{output || '(uruchom kod)'}</div>
          </div>
        </div>

        <div style={{display:'flex',gap:10,marginTop:16}}>
          <button className="btn bp" onClick={handleRun} disabled={isExecuting} style={{flex:1}}>
            {isExecuting ? '⏳ Wykonywanie...' : '▶️ Wykonaj kod'}
          </button>
        </div>
      </div>
    </div>
  );
};

// VICTORY
const Victory = ({ quest, onClaim }) => (
  <div className="ctr" style={{background:'linear-gradient(135deg,#064e3b,#0f172a,#064e3b)',minHeight:'calc(100vh - 60px)'}}>
    <div className="box" style={{maxWidth:380,textAlign:'center',borderColor:'#22c55e'}}>
      <div className="fl" style={{fontSize:56,marginBottom:12}}>{quest.em}⚔️</div>
      <h1 className="ts" style={{fontSize:24,marginBottom:6}}>Zwycięstwo!</h1>
      <p className="tm" style={{marginBottom:16}}>Pokonałeś {quest.en} przez {quest.phases.length} fazy!</p>
      <div className="box" style={{background:'rgba(0,0,0,.3)',marginBottom:16}}>
        <div className="tg" style={{fontSize:15,marginBottom:6}}>🎁 Nagrody:</div>
        <div className="grid" style={{gap:8}}>
          <div className="ts">⭐ +{quest.xp} XP</div>
          <div className="tr">❤️ +30 HP</div>
          {quest.bs && <div className="tp">🧪 +1 Mikstura</div>}
        </div>
      </div>
      <button className="btn bs" onClick={onClaim} style={{width:'100%'}}>✅ Odbierz</button>
    </div>
  </div>
);

// GAME OVER
const GameOver = ({ onRetry, onRestart }) => (
  <div className="ctr" style={{background:'linear-gradient(135deg,#450a0a,#0f172a,#450a0a)',minHeight:'calc(100vh - 60px)'}}>
    <div className="box" style={{maxWidth:380,textAlign:'center',borderColor:'#ef4444'}}>
      <div style={{fontSize:56,marginBottom:12}}>💀</div>
      <h1 className="tr" style={{fontSize:24,marginBottom:6}}>Game Over</h1>
      <p className="tm" style={{marginBottom:16}}>Kod zawiódł...</p>
      <div style={{display:'flex',gap:10,justifyContent:'center'}}>
        <button className="btn bg" onClick={onRetry}>🔄 Ponów</button>
        <button className="btn bp" onClick={onRestart}>🏠 Od nowa</button>
      </div>
    </div>
  </div>
);

// MAIN APP
const App = () => {
  const [screen, setScreen] = useState('loading');
  const [player, setPlayer] = useState(null);
  const [currentChapter, setCurrentChapter] = useState('novice');
  const [currentQuestIndex, setCurrentQuestIndex] = useState(0);

  useEffect(() => {
    initPyodide().then(() => {
      const savedData = localStorage.getItem('pk_full_save');
      if (savedData) {
        const data = JSON.parse(savedData);
        setPlayer(data);
        setCurrentChapter(data.ch);
        setCurrentQuestIndex(data.qi);
      } else {
        setPlayer({hp:100,mhp:100,lv:1,xp:0,pt:1,rk:'📜 Nowicjusz',ch:'novice',qi:0,dn:[]});
      }
      setScreen('chapters');
    });
  }, []);

  useEffect(() => {
    if (player) localStorage.setItem('pk_full_save', JSON.stringify(player));
  }, [player]);

  if (screen === 'loading') return <LoadingScreen />;
  if (!player) return null;

  const restart = () => {
    localStorage.removeItem('pk_full_save');
    setPlayer({hp:100,mhp:100,lv:1,xp:0,pt:1,rk:'📜 Nowicjusz',ch:'novice',qi:0,dn:[]});
    setCurrentChapter('novice');
    setCurrentQuestIndex(0);
    setScreen('chapters');
  };

  const usePot = () => {
    if (player.pt > 0) {
      setPlayer(prev => ({...prev, hp:Math.min(prev.mhp,prev.hp+50), pt:prev.pt-1}));
    }
  };

  const selectChapter = (chapterId) => {
    setCurrentChapter(chapterId);
    setPlayer(prev => ({...prev, ch:chapterId, qi:0}));
    setCurrentQuestIndex(0);
    setScreen('chview');
  };

  const selectQuest = (questIndex) => {
    setCurrentQuestIndex(questIndex);
    setPlayer(prev => ({...prev, qi:questIndex}));
    setScreen('battle');
  };

  const handleVictory = () => {
    setScreen('victory');
  };

  const claimReward = () => {
    const chapterData = QUESTS[currentChapter];
    const quest = chapterData.quests[currentQuestIndex];
    
    const newXp = player.xp + quest.xp;
    const newLv = Math.floor(1 + newXp / 100);
    const newHp = Math.min(player.mhp, player.hp + 30);
    const newPotions = quest.bs ? player.pt + 1 : player.pt;
    const newDone = [...player.dn];
    if (!newDone.includes(quest.id)) newDone.push(quest.id);

    let newRank = player.rk;
    if (newLv >= 15 && !player.rk.includes('Arcymag')) newRank = '👑 Arcymag';
    else if (newLv >= 8 && !player.rk.includes('Mag') && !player.rk.includes('Arcymag')) newRank = '🔮 Mag';

    setPlayer(prev => ({...prev, xp:newXp, lv:newLv, hp:newHp, pt:newPotions, dn:newDone, rk:newRank}));

    if (currentQuestIndex === chapterData.quests.length - 1) {
      setScreen('chapters');
    } else {
      const nextQuestIndex = currentQuestIndex + 1;
      setCurrentQuestIndex(nextQuestIndex);
      setPlayer(prev => ({...prev, qi:nextQuestIndex}));
      setScreen('chview');
    }
  };

  const handleGameOver = () => {
    setScreen('gameover');
  };

  const updatePlayerHp = (newHp) => {
    setPlayer(prev => ({...prev, hp:newHp}));
  };

  const retryBattle = () => {
    setPlayer(prev => ({...prev, hp:prev.mhp}));
    setScreen('battle');
  };

  const currentQuest = QUESTS[currentChapter]?.quests[currentQuestIndex];

  return (
    <div>
      <Header player={player} onUsePot={usePot} />
      {screen === 'chapters' && <ChapterSelect player={player} onSelectChapter={selectChapter} onRestart={restart} />}
      {screen === 'chview' && <QuestList chapter={currentChapter} player={player} onSelectQuest={selectQuest} onBack={()=>setScreen('chapters')} />}
      {screen === 'battle' && currentQuest && <Battle quest={currentQuest} player={player} onVictory={handleVictory} onGameOver={handleGameOver} onBack={()=>setScreen('chview')} onUpdatePlayerHp={updatePlayerHp} />}
      {screen === 'victory' && currentQuest && <Victory quest={currentQuest} onClaim={claimReward} />}
      {screen === 'gameover' && <GameOver onRetry={retryBattle} onRestart={restart} />}
    </div>
  );
};

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
